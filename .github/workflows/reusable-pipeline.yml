name: Reusable CI-CD Pipeline

on:
  workflow_call:
    inputs:
      should_push:
        required: true
        type: boolean
      image_tag:
        required: false
        type: string
        default: 'latest'
    secrets:
      DOCKER_HUB_USERNAME:
        required: false
      DOCKER_HUB_TOKEN:
        required: false
      KUBE_CONFIG:
        required: true

jobs:
  integrated-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Código
        uses: actions/checkout@v4

      - name: Configurar Node.js con Caché
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Ejecutar Pruebas
        run: npm test

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        if: ${{ inputs.should_push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ inputs.should_push }}
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/node-app-painemilla:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configurar acceso a k3s
        shell: bash
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to k3s
        id: deploy
        run: |
          kubectl apply -f k8s/deployment.yaml
          # Verificación con timeout explícito según pauta
          kubectl rollout status deployment/demo-api --timeout=60s

      - name: Rollback automático
        if: failure()
        run: |
          kubectl rollout undo deployment/demo-api
          kubectl rollout status deployment/demo-api --timeout=60s
